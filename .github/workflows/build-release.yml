name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: stable

jobs:
  # ──────────────────────────────────────────────
  # macOS DMG
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    # Uncomment for macOS code signing:
    # env:
    #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
    #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERT_PWD }}
    #   APPLE_SIGNING_IDENTITY: "Developer ID Application: ..."
    #   APPLE_ID: ${{ secrets.APPLE_ID }}
    #   APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
    #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-macos-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-registry-macos-

      - name: Cache Cargo build artifacts
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: cargo-target-macos-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-target-macos-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-macos-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-macos-

      - name: Install npm dependencies
        run: npm install

      - name: Download PDFium for macOS
        run: bash scripts/download-pdfium.sh

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Windows EXE / MSI
  # ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    # Uncomment for Windows code signing:
    # env:
    #   WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
    #   WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERT_PWD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-registry-windows-

      - name: Cache Cargo build artifacts
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: cargo-target-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-target-windows-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-windows-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-windows-

      - name: Install npm dependencies
        run: npm install

      - name: Download PDFium for Windows
        shell: bash
        run: |
          set -e
          LIBS_DIR="src-tauri/libs"
          mkdir -p "$LIBS_DIR"

          if [ -f "$LIBS_DIR/pdfium.dll" ]; then
            echo "✅ PDFium already exists"
            exit 0
          fi

          PDFIUM_TAG="chromium/7749"
          ARCHIVE="pdfium-win-x64.tgz"
          URL="https://github.com/bblanchon/pdfium-binaries/releases/download/${PDFIUM_TAG}/${ARCHIVE}"

          echo "📥 Downloading PDFium from: $URL"
          curl -L --fail -o "$ARCHIVE" "$URL"

          echo "📦 Extracting..."
          mkdir -p pdfium-tmp
          tar -xzf "$ARCHIVE" -C pdfium-tmp

          FOUND="$(find pdfium-tmp -name 'pdfium.dll' -type f | head -1)"
          if [ -z "$FOUND" ]; then
            echo "❌ Could not find pdfium.dll in archive"
            exit 1
          fi

          cp "$FOUND" "$LIBS_DIR/pdfium.dll"
          echo "✅ PDFium installed to $LIBS_DIR/pdfium.dll"

          rm -rf pdfium-tmp "$ARCHIVE"

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # Create GitHub Release (tag pushes only)
  # ──────────────────────────────────────────────
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/windows-nsis/*.exe
            artifacts/windows-msi/*.msi
