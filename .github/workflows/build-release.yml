name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: stable
  CARGO_INCREMENTAL: 0
  # Suppress Node.js 20 deprecation warning for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────
  # macOS Universal DMG (Apple Silicon + Intel)
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    # Uncomment for macOS code signing:
    # env:
    #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
    #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERT_PWD }}
    #   APPLE_SIGNING_IDENTITY: "Developer ID Application: ..."
    #   APPLE_ID: ${{ secrets.APPLE_ID }}
    #   APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
    #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust toolchain with universal targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-macos-universal-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-registry-macos-universal-

      - name: Cache Cargo build artifacts
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: cargo-target-macos-universal-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-target-macos-universal-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-macos-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-macos-

      - name: Install npm dependencies
        run: npm install

      - name: Download PDFium universal dylib for macOS
        run: |
          set -e
          LIBS_DIR="src-tauri/libs"
          mkdir -p "$LIBS_DIR"

          if [ -f "$LIBS_DIR/libpdfium.dylib" ]; then
            echo "✅ PDFium already exists"
            exit 0
          fi

          PDFIUM_TAG="chromium/7749"
          BASE_URL="https://github.com/bblanchon/pdfium-binaries/releases/download/${PDFIUM_TAG}"
          TEMP_DIR="$(mktemp -d)"

          # Download ARM64
          echo "📥 Downloading PDFium arm64..."
          curl -L --fail -o "$TEMP_DIR/pdfium-arm64.tgz" "$BASE_URL/pdfium-mac-arm64.tgz"
          mkdir -p "$TEMP_DIR/arm64"
          tar -xzf "$TEMP_DIR/pdfium-arm64.tgz" -C "$TEMP_DIR/arm64"
          ARM64_LIB="$(find "$TEMP_DIR/arm64" -name 'libpdfium.dylib' -type f | head -1)"

          # Download x86_64
          echo "📥 Downloading PDFium x86_64..."
          curl -L --fail -o "$TEMP_DIR/pdfium-x64.tgz" "$BASE_URL/pdfium-mac-x64.tgz"
          mkdir -p "$TEMP_DIR/x64"
          tar -xzf "$TEMP_DIR/pdfium-x64.tgz" -C "$TEMP_DIR/x64"
          X64_LIB="$(find "$TEMP_DIR/x64" -name 'libpdfium.dylib' -type f | head -1)"

          # Create universal dylib with lipo
          echo "🔗 Creating universal dylib..."
          lipo -create "$ARM64_LIB" "$X64_LIB" -output "$LIBS_DIR/libpdfium.dylib"
          echo "✅ Universal PDFium installed: $(lipo -info "$LIBS_DIR/libpdfium.dylib")"

          rm -rf "$TEMP_DIR"

      - name: Build Tauri universal app
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Ad-hoc code sign the app
        run: |
          APP_PATH="$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name '*.app' -maxdepth 1 | head -1)"
          if [ -n "$APP_PATH" ]; then
            echo "🔏 Ad-hoc signing: $APP_PATH"
            codesign --force --deep -s - "$APP_PATH"
            codesign --verify "$APP_PATH" && echo "✅ Signature verified"
          fi

      - name: Re-create DMG with signed app
        run: |
          APP_PATH="$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name '*.app' -maxdepth 1 | head -1)"
          DMG_DIR="src-tauri/target/universal-apple-darwin/release/bundle/dmg"
          OLD_DMG="$(find "$DMG_DIR" -name '*.dmg' | head -1)"
          DMG_NAME="$(basename "$OLD_DMG")"

          if [ -n "$APP_PATH" ] && [ -n "$OLD_DMG" ]; then
            echo "📦 Re-creating DMG with signed app..."
            rm -f "$OLD_DMG"
            hdiutil create -volname "SocraticNovel" -srcfolder "$APP_PATH" \
              -ov -format UDZO "$DMG_DIR/$DMG_NAME"
            echo "✅ DMG created: $DMG_DIR/$DMG_NAME"
          fi

      - name: Build .pkg installer
        run: |
          set -e
          APP_PATH="$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name '*.app' -maxdepth 1 | head -1)"
          APP_NAME="$(basename "$APP_PATH")"
          VERSION="$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: *"\(.*\)".*/\1/')"
          PKG_DIR="src-tauri/target/universal-apple-darwin/release/bundle/pkg"
          mkdir -p "$PKG_DIR"

          # Create postinstall script to remove quarantine
          SCRIPTS_DIR="$(mktemp -d)"
          cat > "$SCRIPTS_DIR/postinstall" << 'POSTINSTALL'
          #!/bin/bash
          xattr -cr "/Applications/$APP_NAME" 2>/dev/null || true
          POSTINSTALL
          # Replace $APP_NAME in postinstall (it's inside a heredoc so we do it with sed)
          sed -i '' "s|\$APP_NAME|$APP_NAME|g" "$SCRIPTS_DIR/postinstall"
          chmod +x "$SCRIPTS_DIR/postinstall"

          echo "📦 Building .pkg installer..."
          pkgbuild \
            --root "$(dirname "$APP_PATH")" \
            --install-location /Applications \
            --identifier "com.socraticnovel.app" \
            --version "$VERSION" \
            --scripts "$SCRIPTS_DIR" \
            "$PKG_DIR/SocraticNovel_${VERSION}_universal.pkg"

          echo "✅ PKG created: $(ls "$PKG_DIR"/*.pkg)"
          rm -rf "$SCRIPTS_DIR"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: src-tauri/target/universal-apple-darwin/release/bundle/pkg/*.pkg
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Windows EXE / MSI
  # ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-registry-windows-

      - name: Cache Cargo build artifacts
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: cargo-target-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-target-windows-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-windows-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-windows-

      - name: Install npm dependencies
        run: npm install

      - name: Download PDFium for Windows
        shell: bash
        run: |
          set -e
          LIBS_DIR="src-tauri/libs"
          mkdir -p "$LIBS_DIR"

          if [ -f "$LIBS_DIR/pdfium.dll" ]; then
            echo "✅ PDFium already exists"
            exit 0
          fi

          PDFIUM_TAG="chromium/7749"
          ARCHIVE="pdfium-win-x64.tgz"
          URL="https://github.com/bblanchon/pdfium-binaries/releases/download/${PDFIUM_TAG}/${ARCHIVE}"

          echo "📥 Downloading PDFium from: $URL"
          curl -L --fail -o "$ARCHIVE" "$URL"

          echo "📦 Extracting..."
          mkdir -p pdfium-tmp
          tar -xzf "$ARCHIVE" -C pdfium-tmp

          FOUND="$(find pdfium-tmp -name 'pdfium.dll' -type f | head -1)"
          if [ -z "$FOUND" ]; then
            echo "❌ Could not find pdfium.dll in archive"
            exit 1
          fi

          cp "$FOUND" "$LIBS_DIR/pdfium.dll"
          echo "✅ PDFium installed to $LIBS_DIR/pdfium.dll"

          rm -rf pdfium-tmp "$ARCHIVE"

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # Create GitHub Release (tag pushes only)
  # ──────────────────────────────────────────────
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/macos-pkg/*.pkg
            artifacts/windows-nsis/*.exe
            artifacts/windows-msi/*.msi
